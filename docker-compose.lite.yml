# Nebutra-Sailor Lite Local Development Stack (Phase 1)
# Run: docker-compose -f docker-compose.lite.yml up -d
# This stripped-down stack is optimized for UI/Web developers who only need basic SaaS components, 
# omitting heavy Python microservices, Web3, and ClickHouse.

services:
  # ============================================
  # Infrastructure
  # ============================================

  # PostgreSQL (Supabase alternative for local dev)
  # Schema is owned by Prisma 7 (packages/platform/db/prisma/) — see db-migrate service.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nebutra-postgres-lite
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nebutra
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_lite:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot Prisma migrate runner — UI devs hit pg via Prisma, schema must exist.
  db-migrate:
    build:
      context: .
      dockerfile: infra/runtime/docker/Dockerfile.db-migrate
    container_name: nebutra-db-migrate-lite
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Redis (Upstash alternative for local dev)
  redis:
    image: redis:7-alpine
    container_name: nebutra-redis-lite
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_lite:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_lite:
  redis_data_lite:

networks:
  default:
    name: nebutra-lite-network
