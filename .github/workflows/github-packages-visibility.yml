name: GitHub Packages Visibility

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publicize:
    name: Publicize GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@nebutra"

      - name: Publicize scoped packages
        run: bash ./scripts/release-publicize-github-packages.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
