# Contributor License Agreement enforcement.
#
# Powered by cla-assistant.io's official GitHub Action:
#   https://github.com/cla-assistant/github-action
#
# Signatures are stored as JSON on a SEPARATE branch (`cla-signatures`)
# so the main branch stays clean. The action creates the branch + file on
# first run; you do not need to provision it manually.
#
# To onboard a new contributor:
#   1. They open a PR.
#   2. This workflow comments with a sign-CLA link.
#   3. They click, sign once (their GitHub identity is bound to the signature).
#   4. They re-comment "I have read the CLA Document and I hereby sign the CLA"
#      and the workflow flips their PR check to green.
#   5. Every future PR from that account is unblocked automatically.
#
# Bots in the whitelist are never asked to sign.

name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Token permissions required by cla-assistant/github-action — keep tight.
permissions:
  actions: write
  contents: write # write to the cla-signatures branch
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    # Only run on the specific comment OR on any PR event.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')) ||
      (github.event_name == 'pull_request_target')
    steps:
      - name: "CLA Assistant"
        uses: cla-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If/when we want signatures stored in a different repo (e.g. a
          # private legal repo), define PERSONAL_ACCESS_TOKEN as an org
          # secret. Until then, GITHUB_TOKEN is sufficient.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Required by the action — points at the canonical CLA text.
          path-to-document: "https://github.com/Nebutra/Nebutra-Sailor/blob/main/docs/legal/CLA.md"
          # Where signatures get stored (separate branch keeps main clean).
          path-to-signatures: ".github/cla-signatures.json"
          branch: "cla-signatures"
          # Sentence contributors paste in a PR comment to sign.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          # Sentence the bot uses to remind unsigned contributors.
          custom-notsigned-prcomment: |
            Thanks for your contribution! Before we can merge, we need you to sign the
            [Nebutra-Sailor Contributor License Agreement](https://github.com/Nebutra/Nebutra-Sailor/blob/main/docs/legal/CLA.md).

            To sign, reply to this PR with the following sentence — exactly:

            > I have read the CLA Document and I hereby sign the CLA

            Once you sign, all your current and future PRs to this repo are covered.
          custom-allsigned-prcomment: |
            All committers have signed the CLA. Thanks for contributing to Nebutra-Sailor!
          # Bot accounts that should never be asked to sign.
          allowlist: |
            dependabot[bot]
            github-actions[bot]
            renovate[bot]
            lefthook-bot
            *bot
          # Suppress the action when the PR is closed (cleanup only).
          lock-pullrequest-aftermerge: false
