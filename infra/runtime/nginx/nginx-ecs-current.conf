# =============================================================================
# Snapshot of /etc/nginx/nginx.conf on ECS (root@106.15.4.31) — captured 2026-05-10.
#
# This file reflects what is ACTUALLY serving traffic on the production ECS box,
# NOT the canonical/desired config in `infra/nginx/nginx.conf` (that file
# represents the future-state config and includes proxy_params.conf etc. which
# do not exist on this ECS instance).
#
# Differences vs that canonical file:
#   - Inline proxy_set_header directives instead of `include proxy_params.conf`
#   - 10 location blocks now carry the standard reverse-proxy headers
#     (Host / X-Real-IP / X-Forwarded-For / X-Forwarded-Proto / X-Forwarded-Host
#      / X-Request-ID).
#   - 2026-05-10: added the proxy_set_header directives so Next.js standalone
#     behind nginx receives correct request URL and protocol.
#   - 2026-05-12: added X-Forwarded-Host so Next.js 16 standalone constructs
#     internal middleware-rewrite URLs against the public host instead of the
#     listening socket (was producing https://localhost:3000/<rewrite> →
#     EPROTO and 500 on every default-locale page).
#
# Backup of the version before this edit lives on ECS at:
#   /etc/nginx/nginx.conf.bak.20260510-031842
#
# Re-sync command from your Mac (when you make further manual edits on prod):
#   scp root@106.15.4.31:/etc/nginx/nginx.conf infra/nginx/nginx-ecs-current.conf
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 500;
    client_max_body_size 20m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript text/xml application/javascript application/json application/xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api_limit:5m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:5m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:5m rate=10r/s;
    limit_req_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream nebutra_landing {
        server 127.0.0.1:3001;
        keepalive 8;
    }

    upstream nebutra_web {
        server 127.0.0.1:3000;
        keepalive 8;
    }

    upstream nebutra_api {
        server 127.0.0.1:3002;
        keepalive 8;
    }

    upstream nebutra_design_docs {
        server 127.0.0.1:3004;
        keepalive 8;
    }

    upstream nebutra_sailor_docs {
        server 127.0.0.1:3005;
        keepalive 8;
    }

    proxy_http_version 1.1;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 8080;
        server_name _;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_landing; }
        location /_next/static/ {
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    server {
        listen 8081;
        server_name _;
        limit_req zone=general_limit burst=50 nodelay;
        location / {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            add_header Cache-Control "private, no-store" always;
        }
        location /_next/static/ {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
        location /ws {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400s;
        }
    }

    server {
        listen 8082;
        server_name _;
        limit_req zone=api_limit burst=100 nodelay;
        add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
        add_header Access-Control-Max-Age "86400" always;
        location / {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://nebutra_api;
            add_header Cache-Control "no-store" always;
            proxy_read_timeout 120s;
        }
    }

    server {
        listen 80;
        server_name app.nebutra.com;
        limit_req zone=general_limit burst=50 nodelay;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        location / {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            add_header Cache-Control "private, no-store" always;
        }
        location /_next/static/ {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
        location /ws {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400s;
        }
    }

    server {
        listen 443 ssl;
        server_name app.nebutra.com;
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        location / {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            add_header Cache-Control "private, no-store" always;
        }
        location /_next/static/ {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
        location /ws {
            proxy_pass http://nebutra_web;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400s;
        }
    }

    server {
        listen 80;
        server_name api.nebutra.com;
        limit_req zone=api_limit burst=100 nodelay;
        add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
        add_header Access-Control-Max-Age "86400" always;
        location / {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://nebutra_api;
            add_header Cache-Control "no-store" always;
            proxy_read_timeout 120s;
        }
    }

    server {
        listen 443 ssl;
        server_name api.nebutra.com;
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
        add_header Access-Control-Max-Age "86400" always;
        location / {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://nebutra_api;
            add_header Cache-Control "no-store" always;
            proxy_read_timeout 120s;
        }
    }

    # design-docs (Fumadocs design-system docs) — 2026-05-15.
    # PM2 process `design-docs` on 127.0.0.1:3004, Next standalone bundle at
    # /var/www/nebutra/design-docs/current. Same nginx pattern as landing.
    server {
        listen 8083;
        server_name _;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_design_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_design_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    server {
        listen 80;
        server_name design.nebutra.com;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_design_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_design_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    server {
        listen 443 ssl;
        server_name design.nebutra.com;
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_design_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_design_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    # sailor-docs (Fumadocs public product docs) — 2026-05-15.
    # PM2 process `sailor-docs` on 127.0.0.1:3005, Next standalone bundle at
    # /var/www/nebutra/sailor-docs/current. Mirrors design-docs config.
    server {
        listen 8084;
        server_name _;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_sailor_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_sailor_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    server {
        listen 80;
        server_name docs.nebutra.com;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_sailor_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_sailor_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    server {
        listen 443 ssl;
        server_name docs.nebutra.com;
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        limit_req zone=general_limit burst=30 nodelay;
        location / { proxy_pass http://nebutra_sailor_docs; }
        location /_next/static/ {
            proxy_pass http://nebutra_sailor_docs;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }
}
