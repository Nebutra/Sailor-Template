# Self-hosted analytics stack — PostHog CE + Umami + Metabase
# Run: docker-compose -f infra/docker-compose.analytics.yml up -d
# Tear down: docker-compose -f infra/docker-compose.analytics.yml down -v

services:
  # Shared Postgres for Umami + Metabase metadata
  analytics-postgres:
    image: postgres:16-alpine
    container_name: sailor-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-analytics_dev_password}
      POSTGRES_DB: analytics
    volumes:
      - analytics-postgres-data:/var/lib/postgresql/data
      - ./analytics/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "5433:5432"  # Avoid conflict with main app Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostHog CE — product analytics, funnels, cohorts
  # Using the all-in-one image for dev. Production should use the K8s chart.
  posthog:
    image: posthog/posthog:release-1.62.0
    container_name: sailor-posthog
    restart: unless-stopped
    depends_on:
      analytics-postgres:
        condition: service_healthy
      posthog-redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://analytics:${ANALYTICS_POSTGRES_PASSWORD:-analytics_dev_password}@analytics-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-dev_posthog_secret_change_me}
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      DISABLE_SECURE_SSL_REDIRECT: "1"
      IS_BEHIND_PROXY: "0"
    ports:
      - "8000:8000"

  posthog-redis:
    image: redis:7-alpine
    container_name: sailor-posthog-redis
    restart: unless-stopped

  # Umami — privacy-first web analytics
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.14.0
    container_name: sailor-umami
    restart: unless-stopped
    depends_on:
      analytics-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://analytics:${ANALYTICS_POSTGRES_PASSWORD:-analytics_dev_password}@analytics-postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-dev_umami_secret_change_me}
    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s

  # Metabase — BI dashboards over Postgres
  metabase:
    image: metabase/metabase:v0.52.0
    container_name: sailor-metabase
    restart: unless-stopped
    depends_on:
      analytics-postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: analytics
      MB_DB_PASS: ${ANALYTICS_POSTGRES_PASSWORD:-analytics_dev_password}
      MB_DB_HOST: analytics-postgres
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s

volumes:
  analytics-postgres-data:
