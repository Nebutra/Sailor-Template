# =============================================================================
# Nebutra Nginx — ECS Lite (2核4GB, 未备案)
#
# HTTP-only on port 8080 (阿里云未备案无法使用 80/443)
# 通过不同端口区分服务：
#   8080 → Landing Page
#   8081 → Web App (Dashboard)
#   8082 → API Gateway
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 500;
    client_max_body_size 20m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:5m    rate=50r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:5m rate=20r/s;
    limit_req_status 429;

    # Upstreams — pointing to PM2 managed processes on localhost
    upstream nebutra_landing {
        server 127.0.0.1:3001;
        keepalive 8;
    }

    upstream nebutra_web {
        server 127.0.0.1:3000;
        keepalive 8;
    }

    upstream nebutra_api {
        server 127.0.0.1:3002;
        keepalive 8;
    }

    # Common proxy params (inline for simplicity)
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================================================================
    # Landing Page — :8080
    # =========================================================================
    server {
        listen 8080;
        server_name _;

        limit_req zone=general_limit burst=30 nodelay;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://nebutra_landing;
            add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=60" always;
        }

        location /_next/static/ {
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    # =========================================================================
    # Web App (Dashboard) — :8081
    # =========================================================================
    server {
        listen 8081;
        server_name _;

        limit_req zone=general_limit burst=50 nodelay;

        location / {
            proxy_pass http://nebutra_web;
            add_header Cache-Control "private, no-store" always;
        }

        location /_next/static/ {
            proxy_pass http://nebutra_web;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://nebutra_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }

    # =========================================================================
    # API Gateway — :8082
    # =========================================================================
    server {
        listen 8082;
        server_name _;

        limit_req zone=api_limit burst=100 nodelay;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Max-Age "86400" always;

        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://nebutra_api;
            add_header Cache-Control "no-store" always;
            proxy_read_timeout 120s;
        }

        location /webhooks/ {
            proxy_pass http://nebutra_api;
            proxy_read_timeout 30s;
        }
    }
}
