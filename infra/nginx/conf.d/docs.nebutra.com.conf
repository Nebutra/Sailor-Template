# =============================================================================
# docs.nebutra.com — ECS origin bootstrap config
#
# Copy to:
#   /etc/nginx/conf.d/docs.nebutra.com.conf
#
# Origin app:
#   @nebutra/sailor-docs on 127.0.0.1:3004
#
# Start with Cloudflare DNS-only until this origin returns HTTP 200. Add HTTPS
# with certbot after HTTP is healthy.
# =============================================================================

upstream nebutra_docs {
    server 127.0.0.1:3004;
    keepalive 8;
}

server {
    listen 80;
    server_name docs.nebutra.com;

    server_tokens off;
    client_max_body_size 20m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location /_next/static/ {
        proxy_pass http://nebutra_docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        proxy_pass http://nebutra_docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=60" always;
    }
}
