# Lefthook configuration
# Extremely fast parallel git hooks runner in Go

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    secrets-scan:
      run: gitleaks protect --staged --no-banner

pre-push:
  commands:
    typecheck:
      run: pnpm turbo typecheck --affected

commit-msg:
  commands:
    conventional-commit:
      run: 'grep -qE "^(feat|fix|refactor|docs|test|chore|perf|ci|build|style|revert)(\(.+\))?: .+" {1}'
